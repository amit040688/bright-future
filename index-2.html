<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC" crossorigin="anonymous">

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-MrcW6ZMFYlzcLA8Nl+NtUVF0sA7MsXsP1UyJoMp4YLEuNSfAP+JcXn/tWtIaxVXM"
        crossorigin="anonymous"></script>
    <title>Document</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />
</head>




<body>

    <h1 class="animate__animated animate__bounce  text-center mt-5">Javascript Crud Opration</h1>

    <div class="container">
        <div class="row">
            <div class="col-lg-12">
                <div class="bg-primary d-flex justify-content-between align-items-center p-3">
                    <div>
                        <h2 class="text-white fw-bold">#Amit Crud Opration</h2>
                    </div>
                    <div>
                        <button class="p-0">
                            <input type="search">
                        </button>
                        <button class="btn-danger"> - Delete All</button>
                        <button class="btn-success" data-bs-toggle="modal" data-bs-target="#my_modal">+ Add New
                            User</button>
                    </div>
                </div>
            </div>
            <div class="col-lg-12">
                <table class="table text-center table-striped">
                    <thead>
                        <tr>
                            <th>S No.</th>
                            <th>Profile</th>
                            <th>Name</th>
                            <th>DOB</th>
                            <th>Mobile</th>
                            <th>Password</th>
                            <th>Action</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr>
                            <td>1</td>
                            <td>img</td>
                            <td>Alok</td>
                            <td>Alok@gmail.com</td>
                            <td>12-08-1992</td>
                            <td>12345</td>
                            <td>
                                <button class="btn-success p-1 px-2"><i class="fa fa-edit"></i></button>
                                <button class="btn-danger p-1 px-2" data-bs-toggle="modal" data-bs-target="#my_modal"><i
                                        class="fa fa-trash"></i></button>
                            </td>
                        </tr>


                    </tbody>
                </table>
            </div>
        </div>
        <!-- Modal -->

        <div class="modal animate__animated animate__zoomIn" id="my_modal" tabindex="-1"
            aria-labelledby="exampleModalLabel" aria-hidden="true">
            <div class="modal-dialog modal-dialog-centered modal-lg">
                <div class="modal-content">
                    <div class="modal-header bg-primary">
                        <h5 class="modal-title text-white" id="exampleModalLabel">Add New User</h5>
                        <button type="button" class="btn-close bg-white" data-bs-dismiss="modal" aria-label="Close"></button>
                    </div>
                    <div class="modal-body">
                        <form class="register-form">
                            <div class="input-group mb-3" >
                                <span class="input-group-text">name</span>
                                <input type="text" class="form-control">
                            </div>
                            <div class="input-group  mb-3">
                                <span class="input-group-text">Email</span>
                                <input type="email" class="form-control">
                            </div>
                            <div class="input-group  mb-3">
                                <span class="input-group-text">Mobile</span>
                                <input type="number" class="form-control">
                            </div>
                            <div class="input-group  mb-3">
                                <span class="input-group-text">DOB</span>
                                <input type="date" class="form-control">
                            </div>
                            <div class="input-group  mb-3">
                                <span class="input-group-text">Password</span>
                                <input type="password" class="form-control">
                            </div>
                            <div class="input-group  mb-3">
                               
                                <input type="file" class="form-control">
                            </div>
                        </form>
                        
                        
                    </div>
                    <div class="modal-footer">
                        <button type="button" disabled class="btn btn-danger">Update</button>
                        <button type="button" class="btn btn-primary">Submit</button>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <script src="./js/main.js"></script>
</body>


</html>
